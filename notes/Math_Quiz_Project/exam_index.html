        /*  let name = document.getElementById("studentName").value;
        let id = document.getElementById("studentId").value;

        if (name === "" || id === "") {
            alert("សូមបំពេញឈ្មោះ និងលេខរៀងជាមុនសិន!");

        const targetPage = "2L-quiz1_index.html";

        if (action === "exam") {

    // Function សម្រាប់បិទផ្ទាំង Pop-up
    function closeModal() {
        // ស្វែងរកផ្ទាំង Pop-up តាមរយៈ ID រួចបិទវា (លាក់)
        document.getElementById("resultModal").style.display = "none";

        // ជម្រើសបន្ថែម៖ ដោយសារគាត់ប្រលងរួចហើយ ពេលគាត់ចុចបិទ អ្នកអាចឲ្យវា Refresh ទំព័រនេះចោលតែម្ដង
        // ដើម្បីកុំឲ្យគាត់ឃើញសំនួរចាស់ទៀត ដោយលុបសញ្ញា // ខាងមុខកូដខាងក្រោម៖
        // window.location.reload();
    }

    // ដូរ URL នេះទៅជា Web App URL ដែលអ្នកបាន Copy ពីជំហានទី៣
    const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbxuQlrV_jN9-rKplHBI_8_UlIM9Do81Mpns49A1GjalNWCai8hF40jVMUSnYCzKrDhMzA/exec";

    function calculateScore() {
        let name = document.getElementById("studentName").value;
        let id = document.getElementById("studentId").value;

        //   if (name === "" || id === "") {
        //        alert("សូមបំពេញឈ្មោះ និងលេខរៀងជាមុនសិន!");
        //        return;
        //    }

        let totalScore = 0;
        let totalQuestions = 7; // ឧបមាថាអ្នកមាន ៧ សំណួរ (សូមដាក់លេខសរុបនៃសំណួររបស់អ្នក)
        let scorePerQuestion = 1; // ឧបមាថា ១ សំណួរ ១ ពិន្ទុ

        // ប្រើ for loop ដើម្បីរត់ឆែករាល់សំណួរទាំងអស់
        for (let i = 1; i <= totalQuestions; i++) {
            let questionName = "q" + i;
            let selectedAnswer = document.querySelector('input[name="' + questionName + '"]:checked');

            // បើគាត់បានជ្រើសរើសចម្លើយ ហើយវាត្រូវ
            if (selectedAnswer && selectedAnswer.value === "correct") {
                totalScore += scorePerQuestion;
            }
        }

        // ចាប់យកចម្លើយ (ឧទាហរណ៍ដូចសំនួរទី២៦ និង២៧)
        //let q26Answer = document.querySelector('input[name="q26"]:checked');
        //let q27Answer = document.querySelector('input[name="q27"]:checked');

        //if (q26Answer && q26Answer.value === "correct") {
        //    totalScore += 10;
        //}
        //if (q27Answer && q27Answer.value === "correct") {
        //    totalScore += 10;
        //}

        // បិទប៊ូតុង និងបង្ហាញពាក្យ "កំពុងបញ្ជូន..." ដើម្បីកុំឱ្យគាត់ចុចដដែលៗ
        let submitBtn = document.getElementById("submitBtn");
        submitBtn.innerText = "កំពុងបញ្ជូន...";
        submitBtn.disabled = true;

        // រៀបចំទិន្នន័យសម្រាប់បញ្ជូនទៅ Google Sheets
        let dataToSend = {
            name: name,
            id: id,
            score: totalScore
        };

        // ប្រើ Fetch API ដើម្បីបាញ់ទិន្នន័យ
        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(dataToSend),
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            }
        })
            .then((response) => response.json())
            .then((data) => {
                if (data.status === "success") {
                    /*let resultText = "ការបញ្ជូនជោគជ័យ! សួស្តី " + name + " ពិន្ទុសរុបរបស់អ្នកគឺ៖ " + totalScore;
                    document.getElementById("resultText").innerText = resultText;
                    document.getElementById("resultModal").style.display = "block";*/
                    // ១. រៀបចំអត្ថបទដោយប្រើ HTML tags (<br> សម្រាប់ចុះបន្ទាត់, <hr> សម្រាប់គូសបន្ទាត់)
                    let resultText =
                        "ការបញ្ជូនជោគជ័យ!<br><hr>" +
                        "សួស្តី " +
                        name +
                        ", លេខរៀង " +
                        id +
                        "<br>" +
                        "ពិន្ទុសរុបរបស់អ្នកគឺ៖" +
                        "<br><br>" +
                        "អ្នកអាចនឹងធ្លាក់ការប្រលងនេះ !";

                    // ២. ត្រូវដូរពី .innerText ទៅជា .innerHTML ទើបវាស្គាល់កូដ HTML ខាងលើ
                    document.getElementById("resultText").innerHTML = resultText;
                    document.getElementById("resultModal").style.display = "block";

                    localStorage.setItem("hasTakenTest", "true");
                } else if (data.status === "duplicate") {
                    // លោតសារតែមួយ បង្ហាញទាំងឈ្មោះ និងលេខរៀងតែម្ដង
                    alert(
                        "ឈ្មោះ " +
                            name +
                            " ឬ លេខរៀងទី " +
                            id +
                            " បានបញ្ជូនចម្លើយរួចរាល់ហើយ!" +
                            " អ្នកមិនអាចប្រលងម្ដងទៀតបានទេ។"
                    );

                    // បើកប៊ូតុងឱ្យគាត់ចុចវិញ (ក្រែងលោគាត់វាយច្រឡំ)
                    submitBtn.innerText = "បញ្ជូនចម្លើយ";
                    submitBtn.disabled = false;
                }

                /*else if (data.status === "duplicate") {
                    // បែងចែកសារព្រមាន ទៅតាមប្រភេទដែលវាស្ទួន
                    if (data.type === "id") {
                        alert("លេខរៀងទី " + id + " នេះបានបញ្ជូនចម្លើយរួចរាល់ហើយ!");
                    } else if (data.type === "name") {
                        alert("សិស្សឈ្មោះ '" + name + "' បានបញ្ជូនចម្លើយរួចរាល់ហើយ!");
                    }

                    submitBtn.innerText = "បញ្ជូនចម្លើយ";
                    submitBtn.disabled = false;
                } */
            })
            .catch((error) => {
                console.error("Error!", error.message);
                alert("សុំទោស មានបញ្ហាក្នុងការបញ្ជូនទិន្នន័យ។ សូមពិនិត្យអ៊ីនធឺណិតរបស់អ្នក!");
                submitBtn.innerText = "បញ្ជូនចម្លើយ";
                submitBtn.disabled = false;
            });
    }
</script>

<script>
    function goToPage(page) {
        let name = document.getElementById("studentName").value;
        let id = document.getElementById("studentId").value;

        if (name === "" || id === "") {
            alert("សូមបំពេញឈ្មោះ និងលេខរៀងជាមុនសិន!");
            return;
        }

        // លាក់ Menu ដើម
        document.getElementById("home-menu").style.display = "none";

        if (page === "exam") {
            document.getElementById("exam-form").style.display = "block";
        } else if (page === "results") {
            document.getElementById("results-page").style.display = "block";
        }
    }
</script>
