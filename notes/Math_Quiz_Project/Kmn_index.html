<!doctype html>
<html lang="km">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Simulation: ទំនាក់ទំនងមិត្តភាព (Graph Theory)</title>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <style>
            body {
                font-family: "Kantumruy Pro", "Hanuman", Arial, sans-serif;
                background-color: #1e1e24;
                color: #ffffff;
                margin: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 20px;
            }
            h2 {
                margin-bottom: 5px;
                color: #f0f0f0;
                text-align: center;
            }
            p.subtitle {
                color: #aaaaaa;
                margin-top: 0;
                margin-bottom: 20px;
                text-align: center;
            }
            .setup-panel {
                background-color: #333344;
                padding: 15px 25px;
                border-radius: 8px;
                margin-bottom: 15px;
                display: flex;
                gap: 15px;
                align-items: center;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            }
            .setup-panel input {
                width: 50px;
                padding: 5px;
                font-size: 16px;
                border-radius: 4px;
                border: 1px solid #555;
                text-align: center;
            }
            .setup-panel label {
                font-weight: bold;
                font-size: 16px;
            }
            #canvas-container {
                background-color: #2b2b36;
                border-radius: 12px;
                box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
                border: 1px solid #444;
                margin-bottom: 15px;
            }
            .node-v1 {
                fill: #6baed6;
                stroke: #3182bd;
                stroke-width: 2px;
            }
            .node-v2 {
                fill: #74c476;
                stroke: #31a354;
                stroke-width: 2px;
            }
            .node-text {
                fill: #ffffff;
                font-weight: bold;
                font-family: sans-serif;
                pointer-events: none;
                text-anchor: middle;
                dominant-baseline: central;
                font-size: 14px;
            }
            .link {
                stroke: #888888;
                stroke-opacity: 0.6;
                stroke-width: 2px;
            }
            .controls {
                display: flex;
                gap: 10px;
                margin-bottom: 15px;
            }
            button {
                padding: 10px 20px;
                font-size: 16px;
                font-family: "Kantumruy Pro", "Hanuman", sans-serif;
                cursor: pointer;
                border: none;
                border-radius: 6px;
                font-weight: bold;
                transition: all 0.2s;
            }
            .btn-primary {
                background-color: #3182bd;
                color: white;
            }
            .btn-primary:hover:not(:disabled) {
                background-color: #6baed6;
            }
            .btn-action {
                background-color: #4caf50;
                color: white;
            }
            .btn-action:hover:not(:disabled) {
                background-color: #66bb6a;
            }
            .btn-warn {
                background-color: #e6550d;
                color: white;
            }
            .btn-warn:hover:not(:disabled) {
                background-color: #fd8d3c;
            }
            button:disabled {
                background-color: #555;
                color: #888;
                cursor: not-allowed;
            }
            .stats {
                display: flex;
                justify-content: space-around;
                width: 100%;
                max-width: 800px;
                background: #333344;
                padding: 10px;
                border-radius: 8px;
                font-size: 16px;
            }
            .stat-box {
                text-align: center;
            }
            .stat-value {
                font-size: 22px;
                font-weight: bold;
                color: #ffeb3b;
                display: block;
                margin-top: 5px;
            }
            #message {
                font-weight: bold;
                font-size: 16px;
                margin-top: 10px;
                min-height: 25px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <h2>ក្រាហ្វ Bipartite K<sub>m,n</sub></h2>
        <p class="subtitle">ដំណើរការកាត់ផ្តាច់ត្រីកោណបើក (Random Open Triangle Elimination)</p>

        <div class="setup-panel">
            <label>ក្រុម V1 (m): <input type="number" id="input-m" value="4" min="1" max="15" /></label>
            <label>ក្រុម V2 (n): <input type="number" id="input-n" value="3" min="1" max="15" /></label>
            <button class="btn-primary" onclick="initGraph()">បង្កើតក្រាហ្វថ្មី</button>
        </div>

        <div id="canvas-container"></div>

        <div class="controls">
            <button id="btn-prev" class="btn-warn" onclick="stepBackward()" disabled>◀ ថយក្រោយ</button>
            <button id="btn-next" class="btn-action" onclick="stepForward()">ទៅមុខ ១ ជំហាន ▶</button>
        </div>

        <div class="stats">
            <div class="stat-box">ជំហានទី <span id="step-count" class="stat-value">0</span></div>
            <div class="stat-box">ចំនួនមិត្តភាព <span id="edge-count" class="stat-value">0</span></div>
            <div class="stat-box">Max Degree<span id="max-degree" class="stat-value">0</span></div>
        </div>

        <div id="message"></div>

        <script>
            const width = 800;
            const height = 450;
            const radius = 18;
            let svg = d3.select("#canvas-container").append("svg").attr("width", width).attr("height", height);
            let linkGroup = svg.append("g").attr("class", "links");
            let nodeGroup = svg.append("g").attr("class", "nodes");
            let nodes = [];
            let links = [];
            let simulation;
            let historyStates = [];
            let currentStateIndex = -1;

            function cloneState() {
                return {
                    nodes: nodes.map((n) => ({ id: n.id, group: n.group, x: n.x, y: n.y, vx: n.vx, vy: n.vy })),
                    links: links.map((l) => ({
                        source: typeof l.source === "object" ? l.source.id : l.source,
                        target: typeof l.target === "object" ? l.target.id : l.target
                    }))
                };
            }

            function saveHistory() {
                historyStates = historyStates.slice(0, currentStateIndex + 1);
                historyStates.push(cloneState());
                currentStateIndex++;
                updateUI();
            }

            function initGraph() {
                let m = parseInt(document.getElementById("input-m").value);
                let n = parseInt(document.getElementById("input-n").value);
                if (isNaN(m) || m < 1) m = 1;
                if (isNaN(n) || n < 1) n = 1;
                nodes = [];
                links = [];
                historyStates = [];
                currentStateIndex = -1;

                for (let i = 1; i <= m; i++) nodes.push({ id: "A" + i, group: 1 });
                for (let i = 1; i <= n; i++) nodes.push({ id: "B" + i, group: 2 });

                let v1 = nodes.filter((n) => n.group === 1);
                let v2 = nodes.filter((n) => n.group === 2);
                v1.forEach((u) => {
                    v2.forEach((v) => {
                        links.push({ source: u.id, target: v.id });
                    });
                });

                saveHistory();
                renderGraph();
            }

            function areConnected(id1, id2) {
                return links.some(
                    (l) =>
                        (l.source.id === id1 && l.target.id === id2) ||
                        (l.source.id === id2 && l.target.id === id1) ||
                        (l.source === id1 && l.target === id2) ||
                        (l.source === id2 && l.target === id1)
                );
            }

            // មុខងារប្រមូលត្រីកោណបើកទាំងអស់
            function getOpenTriangles() {
                let openTriangles = [];
                for (let i = 0; i < nodes.length; i++) {
                    let v = nodes[i];
                    let neighbors = [];
                    links.forEach((l) => {
                        let sId = typeof l.source === "object" ? l.source.id : l.source;
                        let tId = typeof l.target === "object" ? l.target.id : l.target;
                        if (sId === v.id) neighbors.push(tId);
                        if (tId === v.id) neighbors.push(sId);
                    });

                    if (neighbors.length >= 2) {
                        for (let j = 0; j < neighbors.length; j++) {
                            for (let k = j + 1; k < neighbors.length; k++) {
                                let u = neighbors[j];
                                let w = neighbors[k];
                                if (!areConnected(u, w)) {
                                    openTriangles.push({ v: v.id, u: u, w: w });
                                }
                            }
                        }
                    }
                }
                return openTriangles;
            }

            function applyAlgorithm() {
                let open = getOpenTriangles();
                if (open.length > 0) {
                    // ជ្រើសរើសមួយដោយចៃដន្យ (Random Pick) ជួយការពារកុំឱ្យក្រាហ្វជាប់គាំងដដែលៗ
                    let chosen = open[Math.floor(Math.random() * open.length)];
                    let vId = chosen.v;
                    let uId = chosen.u;
                    let wId = chosen.w;

                    links = links.filter((l) => {
                        let sId = typeof l.source === "object" ? l.source.id : l.source;
                        let tId = typeof l.target === "object" ? l.target.id : l.target;
                        return (
                            !((sId === vId && tId === uId) || (sId === uId && tId === vId)) &&
                            !((sId === vId && tId === wId) || (sId === wId && tId === vId))
                        );
                    });
                    links.push({ source: uId, target: wId });
                    return true;
                }
                return false;
            }

            function stepForward() {
                if (currentStateIndex < historyStates.length - 1) {
                    currentStateIndex++;
                    loadStateFromHistory();
                } else {
                    let success = applyAlgorithm();
                    if (success) saveHistory();
                }
                renderGraph();
            }

            function stepBackward() {
                if (currentStateIndex > 0) {
                    currentStateIndex--;
                    loadStateFromHistory();
                    renderGraph();
                }
            }

            function loadStateFromHistory() {
                let state = historyStates[currentStateIndex];
                nodes = state.nodes.map((n) => ({ ...n }));
                links = state.links.map((l) => ({ source: l.source, target: l.target }));
                updateUI();
            }

            function updateUI() {
                let counts = {};
                nodes.forEach((n) => (counts[n.id] = 0));
                links.forEach((l) => {
                    let sId = typeof l.source === "object" ? l.source.id : l.source;
                    let tId = typeof l.target === "object" ? l.target.id : l.target;
                    counts[sId]++;
                    counts[tId]++;
                });
                let maxDeg = nodes.length > 0 ? Math.max(...Object.values(counts)) : 0;
                let openCount = getOpenTriangles().length;

                document.getElementById("step-count").innerText = currentStateIndex;
                document.getElementById("edge-count").innerText = links.length;
                document.getElementById("max-degree").innerText = maxDeg;
                document.getElementById("btn-prev").disabled = currentStateIndex <= 0;

                let msgEl = document.getElementById("message");

                if (maxDeg <= 1) {
                    document.getElementById("btn-next").disabled = true;
                    msgEl.innerText = "ស្ថានភាពចុងក្រោយ (\u2264 1)។";
                    msgEl.style.color = "#4caf50"; // ពណ៌បៃតង
                } else if (openCount === 0) {
                    document.getElementById("btn-next").disabled = true;
                    msgEl.innerText =
                        "ជាប់អន្ទាក់ (Trap)! គ្មានត្រីកោណបើកទេ តែ Max Degree > 1។ សូមចុចថយក្រោយ 1 ទៅ 2 ជំហាន ហើយសាកល្បងម្ដងទៀត!";
                    msgEl.style.color = "#ffeb3b"; // ពណ៌លឿងព្រមាន
                } else {
                    document.getElementById("btn-next").disabled = false;
                    msgEl.innerText = "";
                }
            }

            function renderGraph() {
                updateUI();
                let link = linkGroup.selectAll("line").data(links, (d) => {
                    let s = typeof d.source === "object" ? d.source.id : d.source;
                    let t = typeof d.target === "object" ? d.target.id : d.target;
                    return s < t ? s + "-" + t : t + "-" + s;
                });
                link.exit().remove();
                let linkEnter = link.enter().append("line").attr("class", "link");
                link = linkEnter.merge(link);

                let node = nodeGroup.selectAll("g").data(nodes, (d) => d.id);
                node.exit().remove();

                let nodeEnter = node
                    .enter()
                    .append("g")
                    .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));
                nodeEnter
                    .append("circle")
                    .attr("r", radius)
                    .attr("class", (d) => (d.group === 1 ? "node-v1" : "node-v2"));
                nodeEnter
                    .append("text")
                    .attr("class", "node-text")
                    .text((d) => d.id);
                node = nodeEnter.merge(node);

                if (simulation) simulation.stop();
                simulation = d3
                    .forceSimulation(nodes)
                    .force(
                        "link",
                        d3
                            .forceLink(links)
                            .id((d) => d.id)
                            .distance(120)
                    )
                    .force("charge", d3.forceManyBody().strength(-350))
                    .force("center", d3.forceCenter(width / 2, height / 2))
                    .force("x", d3.forceX(width / 2).strength(0.08))
                    .force("y", d3.forceY(height / 2).strength(0.08))
                    .alpha(0.5)
                    .restart()
                    .on("tick", () => {
                        link.attr("x1", (d) => Math.max(radius, Math.min(width - radius, d.source.x)))
                            .attr("y1", (d) => Math.max(radius, Math.min(height - radius, d.source.y)))
                            .attr("x2", (d) => Math.max(radius, Math.min(width - radius, d.target.x)))
                            .attr("y2", (d) => Math.max(radius, Math.min(height - radius, d.target.y)));
                        node.attr("transform", (d) => {
                            d.x = Math.max(radius, Math.min(width - radius, d.x));
                            d.y = Math.max(radius, Math.min(height - radius, d.y));
                            return `translate(${d.x},${d.y})`;
                        });
                    });
            }

            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }

            initGraph();
        </script>
    </body>
</html>
