<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>វិញ្ញាសាគណិតវិទ្យា៖ លំហផលចែក (Quotient Spaces)</title>

    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <link rel="stylesheet" href="https://tikzjax.com/v1/fonts.css" />
    <script src="https://tikzjax.com/v1/tikzjax.js"></script>

    <style>
      :root {
        --primary-color: #2c3e50;
        --secondary-color: #34495e;
        --accent-color: #3498db;
        --success-color: #2ecc71;
        --danger-color: #e74c3c;
        --light-bg: #f4f7f6;
        --white: #ffffff;
        --border-radius: 8px;
      }

      body {
        font-family:
          "Khmer OS Battambang",
          "Kantumruy",
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 0;
        background-color: var(--light-bg);
        color: #333;
        line-height: 1.8;
      }

      header {
        background-color: var(--primary-color);
        color: var(--white);
        padding: 25px;
        text-align: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      header h1 {
        margin: 0;
        font-size: 1.8rem;
        font-weight: bold;
      }

      header p {
        margin: 5px 0 0 0;
        font-size: 1rem;
        opacity: 0.9;
      }

      .main-container {
        display: flex;
        max-width: 1200px;
        margin: 20px auto;
        gap: 20px;
        padding: 0 15px;
      }

      .sidebar {
        width: 280px;
        background-color: var(--white);
        border-radius: var(--border-radius);
        padding: 20px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        max-height: 80vh;
        overflow-y: auto;
      }

      .sidebar h2 {
        font-size: 1.1rem;
        margin-top: 0;
        border-bottom: 2px solid var(--light-bg);
        padding-bottom: 10px;
        color: var(--primary-color);
      }

      .question-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }

      .question-btn {
        background-color: #ecf0f1;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 8px 0;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.9rem;
      }

      .question-btn:hover {
        background-color: var(--accent-color);
        color: var(--white);
        border-color: var(--accent-color);
      }

      .question-btn.current {
        background-color: var(--primary-color);
        color: var(--white);
        border-color: var(--primary-color);
      }

      .question-btn.correct {
        background-color: var(--success-color);
        color: var(--white);
        border-color: var(--success-color);
      }

      .question-btn.incorrect {
        background-color: var(--danger-color);
        color: var(--white);
        border-color: var(--danger-color);
      }

      .content-area {
        flex: 1;
        background-color: var(--white);
        border-radius: var(--border-radius);
        padding: 30px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        display: flex;
        flex-direction: column;
      }

      .scoreboard {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        background-color: #ecf0f1;
        padding: 12px 20px;
        border-radius: 6px;
        font-weight: bold;
        font-size: 1.1rem;
      }

      .question-box {
        font-size: 1.2rem;
        line-height: 1.8;
        margin-bottom: 20px;
        padding: 15px;
        border-left: 4px solid var(--accent-color);
        background-color: #fcfcfc;
      }

      .tikz-container {
        display: flex;
        justify-content: center;
        margin: 15px 0;
        background-color: #fafafa;
        padding: 15px;
        border: 1px dashed #ccc;
        border-radius: 6px;
      }

      .options-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 25px;
      }

      .option-card {
        background-color: #fafafa;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 12px 15px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1.05rem;
      }

      .option-card:hover {
        background-color: #f1f7fc;
        border-color: var(--accent-color);
      }

      .option-card input[type="radio"] {
        margin: 0;
        transform: scale(1.2);
      }

      .option-card.selected {
        background-color: #e3f2fd;
        border-color: var(--accent-color);
      }

      .option-card.correct {
        background-color: #d4edda;
        border-color: var(--success-color);
        color: #155724;
        font-weight: bold;
      }

      .option-card.incorrect {
        background-color: #f8d7da;
        border-color: var(--danger-color);
        color: #721c24;
      }

      .control-buttons {
        display: flex;
        justify-content: space-between;
        margin-top: auto;
        padding-top: 20px;
        border-top: 1px solid #ecf0f1;
      }

      .btn {
        padding: 12px 25px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 1rem;
        font-family: inherit;
      }

      .btn-secondary {
        background-color: #ecf0f1;
        color: var(--primary-color);
      }

      .btn-secondary:hover:not(:disabled) {
        background-color: #ddd;
      }

      .btn-secondary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background-color: var(--accent-color);
        color: var(--white);
      }

      .btn-primary:hover {
        background-color: #2980b9;
      }

      .explanation-box {
        margin-top: 20px;
        padding: 15px;
        background-color: #e8f4fd;
        border-left: 5px solid var(--accent-color);
        border-radius: 0 6px 6px 0;
        display: none;
        font-size: 1.05rem;
      }

      .explanation-box h4 {
        margin: 0 0 8px 0;
        color: var(--primary-color);
        font-weight: bold;
      }

      @media (max-width: 768px) {
        .main-container {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>លំហាត់ពិនិត្យការយល់ដឹងលើ៖ លំហផលចែក (Quotient Spaces)</h1>
      <p>ដេប៉ាតឺម៉ង់គណិតវិទ្យា - វិទ្យាសាស្ត្រគណិតវិទ្យាកម្រិតខ្ពស់</p>
    </header>

    <div class="main-container">
      <div class="sidebar">
        <h2>បញ្ជីសំណួរ (១ - ៥០)</h2>
        <div class="question-grid" id="sidebar-grid"></div>
      </div>

      <div class="content-area">
        <div class="scoreboard">
          <span id="question-indicator">សំណួរទី ១ / ៥០</span>
          <span id="score-indicator">ពិន្ទុ៖ ០ / ៥០</span>
        </div>

        <div id="current-question-container"></div>

        <div class="control-buttons">
          <button class="btn btn-secondary" id="prev-btn" onclick="prevQuestion()">ថយក្រោយ</button>
          <button class="btn btn-primary" id="submit-btn" onclick="checkAnswer()">ផ្ទៀងផ្ទាត់ចម្លើយ</button>
          <button class="btn btn-secondary" id="next-btn" onclick="nextQuestion()">បន្ទាប់</button>
        </div>
      </div>
    </div>

    <script>
      const questions =,
          correct: 1,
          explanation: "លំហផលចែក \\(V/W\\) គឺជាសំណុំនៃថ្នាក់សមមូល (កូសេត) ដែលត្រូវបានបង្កើតឡើងដោយទំនាក់ទំនងសមមូល \\(v \\sim v' \\iff v' - v \\in W\\) ។"
        },
        {
          id: 2,
          question: "ឧបមាថា \\(W\\) ជាលំហរងនៃលំហវ៉ិចទ័រ \\(V\\)។ តើវ៉ិចទ័រពីរ \\(u, v \\in V\\) ស្ថិតនៅក្នុងកូសេតតែមួយ \\(u + W = v + W\\) លុះត្រាតែមានលក្ខខណ្ឌអ្វី?",
          options:,
          correct: 2,
          explanation: "តាមនិយមន័យនៃទំនាក់ទំនងសមមូល កូសេតពីរស្មើគ្នា \\(u + W = v + W\\) លុះត្រាតែផលសង \\(u - v\\) ស្ថិតនៅក្នុងលំហរង \\(W\\) ។"
        },
        {
          id: 3,
          question: "តើធាតុសូន្យ (Additive Identity) នៃលំហផលចែក \\(V/W\\) គឺជាអ្វី?",
          options:,
          correct: 2,
          explanation: "ធាតុសូន្យនៅក្នុង \\(V/W\\) គឺកូសេត \\(0 + W\\) ពីព្រោះចំពោះគ្រប់ \\(v + W \\in V/W\\) គេមាន \\((v+W) + (0+W) = (v+0) + W = v+W\\) ។"
        },
        {
          id: 4,
          question: "ប្រសិនបើ \\(V = \\mathbb{R}^3\\) និង \\(W\\) ជាប្លង់កាត់តាមគល់តម្រុយ (លំហរងវិមាត្រ ២) តើលំហផលចែក \\(V/W\\) មានទម្រង់ធរណីមាត្រជាអ្វី?",
          options: [
            "ចំណុចមួយ (វិមាត្រ ០)",
            "បន្ទាត់ត្រង់កាត់តាមគល់តម្រុយ (វិមាត្រ ១)",
            "ប្លង់ពីរស្របគ្នា",
            "លំហវិមាត្រ ៣ ទាំងមូល"
          ],
          correct: 1,
          explanation: "វិមាត្រនៃ \\(V/W\\) គឺ \\(\\dim(V/W) = \\dim(V) - \\dim(W) = 3 - 2 = 1\\) ។ លំហវ៉ិចទ័រវិមាត្រ ១ គឺស្មើនឹងបន្ទាត់ត្រង់មួយ។"
        },
        {
          id: 5,
          question: "ឧបមាថា \\(V\\) ជាលំហវ៉ិចទ័រមានវិមាត្រ \\(n\\) ហើយ \\(W\\) ជាលំហរងមានវិមាត្រ \\(k\\)។ តើវិមាត្រនៃលំហផលចែក \\(V/W\\) ស្មើនឹងប៉ុន្មាន?",
          options: [
            "\\(n + k\\)",
            "\\(n \\cdot k\\)",
            "\\(n - k\\)",
            "\\(k\\)"
          ],
          correct: 2,
          explanation: "តាមទ្រឹស្តីបទវិមាត្រ លំហផលចែក \\(V/W\\) មានវិមាត្រស្មើនឹងវិមាត្រនៃលំហដើម \\(V\\) ដកនឹងវិមាត្រនៃលំហរង \\(W\\) គឺ \\(\\dim(V/W) = \\dim(V) - \\dim(W) = n - k\\) ។"
        },
        {
          id: 6,
          question: "តើការបូកនៅក្នុងលំហផលចែក \\(V/W\\) ត្រូវបានកំណត់យ៉ាងដូចម្តេច?",
          options:,
          correct: 0,
          explanation: "ប្រតិបត្តិការបូកត្រូវបានកំណត់ដោយបូកតំណាងកូសេតនីមួយៗគឺ \\((u+W)+(v+W) = (u+v)+W\\) ។"
        },
        {
          id: 7,
          question: "តើការគុណនឹងស្កាលែនៅក្នុងលំហផលចែក \\(V/W\\) ត្រូវបានកំណត់យ៉ាងដូចម្តេច?",
          options:,
          correct: 1,
          explanation: "ចំពោះស្កាលែ \\(c \\in F\\) និងកូសេត \\(v+W \\in V/W\\) ការគុណនឹងស្កាលែគឺ \\(c(v+W) = cv+W\\) ។"
        },
        {
          id: 8,
          question: "ដើម្បីឱ្យប្រតិបត្តិការបូកនៅលើ \\(V/W\\) និយមន័យបានត្រឹមត្រូវ (Well-defined) តើលក្ខខណ្ឌណាដែលសំខាន់បំផុតសម្រាប់ \\(W\\)?",
          options:,
          correct: 0,
          explanation: "ប្រសិនបើ \\(W\\) មិនមែនជាលំហរងទេ នោះលទ្ធផលនៃប្រតិបត្តិការនឹងអាស្រ័យលើការជ្រើសរើសតំណាងកូសេត ដែលធ្វើឱ្យប្រតិបត្តិការមិនអាចកំណត់បានត្រឹមត្រូវ ។"
        },
        {
          id: 9,
          question: "តើអាប់លីកាស្យុងកាណូនិក (Canonical Projection) \\(\\pi: V \\to V/W\\) ត្រូវបានកំណត់យ៉ាងដូចម្តេច?",
          options:,
          correct: 1,
          explanation: "អាប់លីកាស្យុងកាណូនិក បញ្ជូនវ៉ិចទ័រ \\(v \\in V\\) ទៅកាន់កូសេតរបស់វាគឺ \\(v + W\\) នៅក្នុង \\(V/W\\) ។"
        },
        {
          id: 10,
          question: "ចូរពិនិត្យមើលរូបធរណីមាត្រនៃលំហផលចែក \\(V/W\\) នៅក្នុងសំណួរនេះ។ តើបន្ទាត់នីមួយៗដែលស្របនឹង \\(W\\) តំណាងឱ្យអ្វីនៅក្នុង \\(V/W\\)?",
          tikz: "\\draw[->, thick] (-2.5,0) -- (2.5,0) node[right] {$x$};\n\\draw[->, thick] (0,-2.5) -- (0,2.5) node[above] {$y$};\n\\draw[blue, ultra thick] (-2,-1) -- (2,1) node[right] {$W$};\n\\draw[red, thick, dashed] (-2,0) -- (2,2) node[right] {$v_1 + W$};\n\\draw[red, thick, dashed] (-2,-2) -- (2,0) node[right] {$v_2 + W$};\n\\filldraw[black] (0.5, 1.25) circle (1.5pt) node[above] {$v_1$};\n\\filldraw[black] (-0.5, -1.25) circle (1.5pt) node[below] {$v_2$};",
          options:,
          correct: 1,
          explanation: "ក្នុងធរណីមាត្រ កូសេត \\(v + W\\) គឺជាបន្ទាត់ត្រង់ស្របនឹង \\(W\\)។ ដូច្នេះ បន្ទាត់ស្របគ្នានីមួយៗគឺជាធាតុមួយ (វ៉ិចទ័រមួយ) នៃលំហផលចែក \\(V/W\\) ។"
        },
        {
          id: 11,
          question: "ប្រសិនបើ \\(V\\) ជាលំហវ៉ិចទ័រនៃប៉ូលីណូមដែលមានដឺក្រេយ៉ាងច្រើន \\(n\\) (\\(P_n(x)\\)) និង \\(W = P_{n-1}(x)\\) ជាលំហរងនៃប៉ូលីណូមដឺក្រេយ៉ាងច្រើន \\(n-1\\)។ តើវិមាត្រនៃ \\(V/W\\) ស្មើនឹងប៉ុន្មាន?",
          options: [
            "\\(n\\)",
            "\\(1\\)",
            "\\(n+1\\)",
            "\\(0\\)"
          ],
          correct: 1,
          explanation: "វិមាត្រនៃ \\(P_n(x)\\) គឺ \\(n+1\\)  និងវិមាត្រនៃ \\(P_{n-1}(x)\\) គឺ \\(n\\)។ ដូច្នេះ \\(\\dim(V/W) = (n+1) - n = 1\\) ។"
        },
        {
          id: 12,
          question: "ប្រសិនបើ \\(W = V\\) តើលំហផលចែក \\(V/V\\) ស្មើនឹងអ្វី?",
          options: [
            "\\(V\\)",
            "\\(\\{0\\}\\) (លំហសូន្យដែលមានតែធាតុ \\(0+V\\))",
            "គ្មាននិយមន័យទេ",
            "សំណុំទទេ"
          ],
          correct: 1,
          explanation: "ប្រសិនបើ \\(W = V\\) នោះគ្រប់វ៉ិចទ័រទាំងអស់ស្ថិតនៅក្នុងកូសេតតែមួយគឺ \\(0 + V\\)។ ដូចនេះ \\(V/V\\) មានតែធាតុមួយគត់គឺវ៉ិចទ័រសូន្យ ។"
        },

          explanation: "ដោយសារ \\(W^0 \\cong (V/W)^*\\) ហើយវិមាត្រនៃលំហទ្វេស្មើនឹងវិមាត្រនៃលំហដើម គេបាន \\(\\dim(W^0) = \\dim((V/W)^*) = \\dim(V/W) = \\dim(V) - \\dim(W)\\) ។"
        },
        {
          id: 50,
          question: "ឧបមាថា \\(V = \\mathbb{R}^4\\) និង \\(W = \\text{span}\\{(1, 1, 1, 1), (1, -1, 1, -1)\\}\\)។ តើវិមាត្រនៃលំហផលចែក \\(V/W\\) ស្មើនឹងប៉ុន្មាន?",
          options: [
            "\\(1\\)",
            "\\(2\\)",
            "\\(3\\)",
            "\\(4\\)"
          ],
          correct: 1,
          explanation: "វ៉ិចទ័របង្កើតទាំងពីរនៃ \\(W\\) មិនមែនជាពហុគុណគ្នានឹងគ្នាទេ ដូច្នេះពួកវាឯករាជ្យលីនេអ៊ែរ  នាំឱ្យ \\(\\dim(W) = 2\\)។ ដូចនេះ \\(\\dim(V/W) = 4 - 2 = 2\\) ។"
        }
      ];

      let currentQuestionIndex = 0;
      let userAnswers = Array(questions.length).fill(null);
      let verifiedAnswers = Array(questions.length).fill(false);
      let score = 0;

      function initSidebar() {
        const grid = document.getElementById('sidebar-grid');
        grid.innerHTML = '';
        questions.forEach((q, index) => {
          const btn = document.createElement('button');
          btn.className = 'question-btn';
          btn.id = 'sidebar-btn-' + index;
          btn.innerText = index + 1;
          btn.onclick = () => loadQuestion(index);
          grid.appendChild(btn);
        });
        updateSidebarColors();
      }

      function updateSidebarColors() {
        questions.forEach((q, index) => {
          const btn = document.getElementById('sidebar-btn-' + index);
          if (!btn) return;
          btn.className = 'question-btn';
          if (index === currentQuestionIndex) {
            btn.classList.add('current');
          } else if (verifiedAnswers[index]) {
            if (userAnswers[index] === q.correct) {
              btn.classList.add('correct');
            } else {
              btn.classList.add('incorrect');
            }
          }
        });
      }

      function loadQuestion(index) {
        currentQuestionIndex = index;
        const q = questions[index];

        document.getElementById('question-indicator').innerText = 'សំណួរទី ' + (index + 1) + ' / ' + questions.length;

        const container = document.getElementById('current-question-container');

        let html = '<div class="question-box"><strong>សំណួរទី ' + q.id + '៖</strong> ' + q.question + '</div>';

        if (q.tikz) {
          html += '<div class="tikz-container"><script type="text/tikz">' + q.tikz + '</s' + 'cript></div>';
        }

        html += '<div class="options-container" id="options-box">';
        for (let i = 0; i < q.options.length; i++) {
          let selectedClass = (userAnswers[index] === i)? 'selected' : '';
          let checkedAttr = (userAnswers[index] === i)? 'checked' : '';
          let disabledAttr = verifiedAnswers[index]? 'disabled' : '';

          html += '<div class="option-card ' + selectedClass + '" id="opt-card-' + i + '" onclick="selectOption(' + i + ')">' +
            '<input type="radio" name="q-option" value="' + i + '" ' + checkedAttr + ' ' + disabledAttr + '>' +
            '<label>' + String.fromCharCode(65 + i) + ') ' + q.options[i] + '</label>' +
            '</div>';
        }
        html += '</div>';

        html += '<div class="explanation-box" id="explanation-container">' +
          '<h4>ការពន្យល់លម្អិត៖</h4>' +
          '<p>' + q.explanation + '</p>' +
          '</div>';

        container.innerHTML = html;

        if (window.MathJax) {
          MathJax.typesetPromise();
        }

        const explanationBox = document.getElementById('explanation-container');
        const submitBtn = document.getElementById('submit-btn');

        if (verifiedAnswers[index]) {
          explanationBox.style.display = 'block';
          submitBtn.style.display = 'none';
          highlightAnswers(index);
        } else {
          explanationBox.style.display = 'none';
          submitBtn.style.display = 'block';
        }

        document.getElementById('prev-btn').disabled = (index === 0);
        document.getElementById('next-btn').disabled = (index === questions.length - 1);

        updateSidebarColors();
      }

      function selectOption(oIdx) {
        if (verifiedAnswers[currentQuestionIndex]) return;

        userAnswers[currentQuestionIndex] = oIdx;

        const cards = document.getElementsByClassName('option-card');
        for (let i = 0; i < cards.length; i++) {
          cards[i].classList.remove('selected');
          cards[i].querySelector('input').checked = false;
        }

        const selectedCard = document.getElementById('opt-card-' + oIdx);
        if (selectedCard) {
          selectedCard.classList.add('selected');
          selectedCard.querySelector('input').checked = true;
        }
      }

      function checkAnswer() {
        const idx = currentQuestionIndex;
        if (userAnswers[idx] === null) {
          alert("សូមជ្រើសរើសចម្លើយមួយ មុននឹងផ្ទៀងផ្ទាត់!");
          return;
        }

        verifiedAnswers[idx] = true;
        highlightAnswers(idx);

        if (userAnswers[idx] === questions[idx].correct) {
          score++;
        }
        document.getElementById('score-indicator').innerText = 'ពិន្ទុ៖ ' + score + ' / ' + questions.length;

        document.getElementById('explanation-container').style.display = 'block';
        document.getElementById('submit-btn').style.display = 'none';

        if (window.MathJax) {
          MathJax.typesetPromise();
        }

        updateSidebarColors();
      }

      function highlightAnswers(index) {
        const q = questions[index];
        const selectedIdx = userAnswers[index];

        for (let i = 0; i < q.options.length; i++) {
          const card = document.getElementById('opt-card-' + i);
          if (!card) continue;
          card.classList.remove('selected');
          if (i === q.correct) {
            card.classList.add('correct');
          } else if (i === selectedIdx) {
            card.classList.add('incorrect');
          }
        }
      }

      function prevQuestion() {
        if (currentQuestionIndex > 0) {
          loadQuestion(currentQuestionIndex - 1);
        }
      }

      function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
          loadQuestion(currentQuestionIndex + 1);
        }
      }

      window.onload = () => {
        initSidebar();
        loadQuestion(0);
      };
    </script>
  </body>
</html>
