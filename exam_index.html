    <style>

      body {

        background-color: var(--primary-color);

        display: flex;

        display: grid;

  <body>
    <header><h1>លំហាត់ពិនិត្យការយល់ដឹង៖ លំហផលចែក (Quotient Spaces)</h1></header>

    <div class="main-container">
      <div class="sidebar">
        <h2>បញ្ជីសំណួរ</h2>
        <div class="question-grid" id="sidebar-grid"></div>
      </div>

      <div class="content-area">
        <div id="scoreboard" style="font-size: x-large; font-weight: bold; text-align-last: end; color: #e74c3c">
          ពិន្ទុ៖ ០ / ៥០
        </div>
        <div id="current-question-container"></div>

        <div class="control-buttons">
          <button onclick="prevQuestion()">ថយក្រោយ</button>
          <button id="submit-btn" onclick="checkAnswer()">ផ្ទៀងផ្ទាត់</button>
          <button onclick="nextQuestion()">បន្ទាប់</button>
        </div>
      </div>
    </div>

    <script>
      const questions = [
        {
          id: 1,
          question: "លំហផលចែក \\(V/W\\) គឺជាសំណុំនៃអ្វី?",
          options: ["ថ្នាក់សមមូល (កូសេត)", "វ៉ិចទ័រសូន្យ", "លំហរង \\(W\\)", "គ្រប់វ៉ិចទ័រក្នុង \\(V\\)"],
          correct: 0,
          explanation:
            "លំហផលចែក \\(V/W\\) គឺជាសំណុំនៃថ្នាក់សមមូល (កូសេត) ដែលបង្កើតដោយទំនាក់ទំនងសមមូល \\(v \\sim v' \\iff v' - v \\\in W\\) ។"
        },
        {
          id: 2,
          question: "តើវ៉ិចទ័រពីរ \\(u, v\\) ស្ថិតនៅក្នុងកូសេតតែមួយ លុះត្រាតែមានលក្ខខណ្ឌអ្វី?",
          options: ["a) \\(u+v \\\in W\\)", "b) \\(u-v \\\in W\\)", "c) \\(u,v \\\in W\\)", "d) គ្មានលក្ខខណ្ឌ"],
          correct: 1,
          explanation: "កូសេតពីរស្មើគ្នា \\(u + W = v + W\\) លុះត្រាតែផលសង \\(u - v\\) ស្ថិតនៅក្នុងលំហរង \\(W\\) ។"
        },
        // អ្នកអាចបន្ថែមសំណួរទី ៣ ដល់ ៥០ តាមទម្រង់នេះ

        {
          id: 3,
          question: "តើធាតុសូន្យ (Additive Identity) នៃលំហផលចែក \\(V/W\\) គឺជាអ្វី?",
          options: [1],
          correct: 2,
          explanation:
            "ធាតុសូន្យនៅក្នុង \\(V/W\\) គឺកូសេត \\(0 + W\\) ពីព្រោះចំពោះគ្រប់ \\(v + W \\\in V/W\\) គេមាន \\((v+W) + (0+W) = (v+0) + W = v+W\\) ។"
        },

        {
          id: 4,
          question:
            "ប្រសិនបើ \\(V = \\\mathbb{R}^3\\) និង \\(W\\) ជាប្លង់កាត់តាមគល់តម្រុយ (លំហរងវិមាត្រ ២) តើលំហផលចែក \\(V/W\\) មានទម្រង់ធរណីមាត្រជាអ្វី?",
          options: [
            "ចំណុចមួយ (វិមាត្រ ០)",
            "បន្ទាត់ត្រង់កាត់តាមគល់តម្រុយ (វិមាត្រ ១)",
            "ប្លង់ពីរស្របគ្នា",
            "លំហវិមាត្រ ៣ ទាំងមូល"
          ],
          correct: 1,
          explanation:
            "វិមាត្រនៃ \\(V/W\\) គឺ \\(\\dim(V/W) = \\dim(V) - \\dim(W) = 3 - 2 = 1\\) ។ លំហវ៉ិចទ័រវិមាត្រ ១ គឺស្មើនឹងបន្ទាត់ត្រង់មួយ។"
        },
        {
          id: 5,
          question:
            "ឧបមាថា \\(V\\) ជាលំហវ៉ិចទ័រមានវិមាត្រ \\(n\\) ហើយ \\(W\\) ជាលំហរងមានវិមាត្រ \\(k\\)។ តើវិមាត្រនៃលំហផលចែក \\(V/W\\) ស្មើនឹងប៉ុន្មាន?",
          options: ["\\(n + k\\)", "\\(n \\cdot k\\)", "\\(n - k\\)", "\\(k\\)"],
          correct: 2,
          explanation:
            "តាមទ្រឹស្តីបទវិមាត្រ លំហផលចែក \\(V/W\\) មានវិមាត្រស្មើនឹងវិមាត្រនៃលំហដើម \\(V\\) ដកនឹងវិមាត្រនៃលំហរង \\(W\\) គឺ \\(\\dim(V/W) = \\dim(V) - \\dim(W) = n - k\\) ។"
        },
        {
          id: 6,
          question: "តើការបូកនៅក្នុងលំហផលចែក \\(V/W\\) ត្រូវបានកំណត់យ៉ាងដូចម្តេច?",
          options: [],
          correct: 0,
          explanation: "ប្រតិបត្តិការបូកត្រូវបានកំណត់ដោយបូកតំណាងកូសេតនីមួយៗគឺ \\((u+W)+(v+W) = (u+v)+W\\) ។"
        },
        {
          id: 7,
          question: "តើការគុណនឹងស្កាលែនៅក្នុងលំហផលចែក \\(V/W\\) ត្រូវបានកំណត់យ៉ាងដូចម្តេច?",
          options: [],
          correct: 1,
          explanation: "ចំពោះស្កាលែ \\(c \\in F\\) និងកូសេត \\(v+W \\in V/W\\) ការគុណនឹងស្កាលែគឺ \\(c(v+W) = cv+W\\) ។"
        },
        {
          id: 8,
          question:
            "ដើម្បីឱ្យប្រតិបត្តិការបូកនៅលើ \\(V/W\\) និយមន័យបានត្រឹមត្រូវ (Well-defined) តើលក្ខខណ្ឌណាដែលសំខាន់បំផុតសម្រាប់ \\(W\\)?",
          options: [],
          correct: 0,
          explanation:
            "ប្រសិនបើ \\(W\\) មិនមែនជាលំហរងទេ នោះលទ្ធផលនៃប្រតិបត្តិការនឹងអាស្រ័យលើការជ្រើសរើសតំណាងកូសេត ដែលធ្វើឱ្យប្រតិបត្តិការមិនអាចកំណត់បានត្រឹមត្រូវ ។"
        },
        {
          id: 9,
          question: "តើអាប់លីកាស្យុងកាណូនិក (Canonical Projection) \\(\\pi: V \\to V/W\\) ត្រូវបានកំណត់យ៉ាងដូចម្តេច?",
          options: [],
          correct: 1,
          explanation:
            "អាប់លីកាស្យុងកាណូនិក បញ្ជូនវ៉ិចទ័រ \\(v \\in V\\) ទៅកាន់កូសេតរបស់វាគឺ \\(v + W\\) នៅក្នុង \\(V/W\\) ។"
        },
        {
          id: 10,
          question:
            "ចូរពិនិត្យមើលរូបធរណីមាត្រនៃលំហផលចែក \\(V/W\\) នៅក្នុងសំណួរនេះ។ តើបន្ទាត់នីមួយៗដែលស្របនឹង \\(W\\) តំណាងឱ្យអ្វីនៅក្នុង \\(V/W\\)?",
          tikz: "\\draw[->, thick] (-2.5,0) -- (2.5,0) node[right] {$x$};\n\\draw[->, thick] (0,-2.5) -- (0,2.5) node[above] {$y$};\n\\draw[blue, ultra thick] (-2,-1) -- (2,1) node[right] {$W$};\n\\draw[red, thick, dashed] (-2,0) -- (2,2) node[right] {$v_1 + W$};\n\\draw[red, thick, dashed] (-2,-2) -- (2,0) node[right] {$v_2 + W$};\n\\filldraw[black] (0.5, 1.25) circle (1.5pt) node[above] {$v_1$};\n\\filldraw[black] (-0.5, -1.25) circle (1.5pt) node[below] {$v_2$};",
          options: [],
          correct: 1,
          explanation:
            "ក្នុងធរណីមាត្រ កូសេត \\(v + W\\) គឺជាបន្ទាត់ត្រង់ស្របនឹង \\(W\\)។ ដូច្នេះ បន្ទាត់ស្របគ្នានីមួយៗគឺជាធាតុមួយ (វ៉ិចទ័រមួយ) នៃលំហផលចែក \\(V/W\\) ។"
        },
        {
          id: 11,
          question:
            "ប្រសិនបើ \\(V\\) ជាលំហវ៉ិចទ័រនៃប៉ូលីណូមដែលមានដឺក្រេយ៉ាងច្រើន \\(n\\) (\\(P_n(x)\\)) និង \\(W = P_{n-1}(x)\\) ជាលំហរងនៃប៉ូលីណូមដឺក្រេយ៉ាងច្រើន \\(n-1\\)។ តើវិមាត្រនៃ \\(V/W\\) ស្មើនឹងប៉ុន្មាន?",
          options: ["\\(n\\)", "\\(1\\)", "\\(n+1\\)", "\\(0\\)"],
          correct: 1,
          explanation:
            "វិមាត្រនៃ \\(P_n(x)\\) គឺ \\(n+1\\)  និងវិមាត្រនៃ \\(P_{n-1}(x)\\) គឺ \\(n\\)។ ដូច្នេះ \\(\\dim(V/W) = (n+1) - n = 1\\) ។"
        },
        {
          id: 12,
          question: "ប្រសិនបើ \\(W = V\\) តើលំហផលចែក \\(V/V\\) ស្មើនឹងអ្វី?",
          options: ["\\(V\\)", "\\(\\{0\\}\\) (លំហសូន្យដែលមានតែធាតុ \\(0+V\\))", "គ្មាននិយមន័យទេ", "សំណុំទទេ"],
          correct: 1,
          explanation:
            "ប្រសិនបើ \\(W = V\\) នោះគ្រប់វ៉ិចទ័រទាំងអស់ស្ថិតនៅក្នុងកូសេតតែមួយគឺ \\(0 + V\\)។ ដូចនេះ \\(V/V\\) មានតែធាតុមួយគត់គឺវ៉ិចទ័រសូន្យ ។"
        },
        {
          id: 13,
          question:
            "ប្រសិនបើ \\(W = \\{0\\}\\) ជាលំហរងសូន្យ តើលំហផលចែក \\(V/\\{0\\}\\) អ៊ីសូម៉ូភីស (Isomorphic) ទៅនឹងលំហណា?",
          options: ["\\(\\{0\\}\\)", "\\(V\\)", "\\(V^*\\) (លំហទ្វេ)", "គ្មានទំនាក់ទំនងទេ"],
          correct: 1,
          explanation:
            "កូសេតនីមួយៗនៃ \\(V/\\{0\\}\\) គឺ \\(v + \\{0\\} = \\{v\\}\\) ដែលមានតែវ៉ិចទ័រ \\(v\\) មួយគត់។ ដូច្នេះមានប៊ីសេកស្យុងធម្មជាតិ និងអ៊ីសូម៉ូភីសរវាង \\(V\\) និង \\(V/\\{0\\}\\) ។"
        },
        {
          id: 14,
          question:
            "ឧបមាថា \\(T: V \\to U\\) ជាអាប់លីកាស្យុងលីនេអ៊ែរ។ តាមទ្រឹស្តីបទអ៊ីសូម៉ូភីសទី១ (First Isomorphism Theorem) តើលំហផលចែក \\(V/\\ker(T)\\) អ៊ីសូម៉ូភីសទៅនឹងអ្វី?",
          options: [],
          correct: 2,
          explanation:
            "តាមទ្រឹស្តីបទអ៊ីសូម៉ូភីសទី១ លំហផលចែកនៃលំហដើមដោយស្នូលរបស់វាគឺអ៊ីសូម៉ូភីសទៅនឹងរូបភាពរបស់វា៖ \\(V/\\ker(T) \\cong \\text{Im}(T)\\) ។"
        },
        {
          id: 15,
          question: "តើអាប់លីកាស្យុងកាណូនិក \\(\\pi: V \\to V/W\\) ជាប្រភេទអាប់លីកាស្យុងអ្វី?",
          options: [],

        if (window.MathJax) MathJax.typesetPromise();

        // នៅក្នុង function loadQuestion(index) របស់អ្នក៖
        // បន្ទាប់ពី container.innerHTML = html; សូមបន្ថែម៖

        container.querySelectorAll("mjx-container").forEach((el) => {
          el.style.fontSize = "106%"; // កំណត់ទំហំធំជាងអត្ថបទធម្មតា
        });
      }

      function selectOption(idx) {
        if (verifiedAnswers[currentQuestionIndex]) return;
        userAnswers[currentQuestionIndex] = idx;
        document.querySelectorAll(".option-card").forEach((el, i) => {
          el.className = "option-card" + (i === idx ? " selected" : "");
        });
      }

      function checkAnswer() {
        if (userAnswers[currentQuestionIndex] === null) return alert("សូមជ្រើសរើសចម្លើយ!");
        verifiedAnswers[currentQuestionIndex] = true;
        const isCorrect = userAnswers[currentQuestionIndex] === questions[currentQuestionIndex].correct;
        if (isCorrect) score++;

        document.getElementById("exp").style.display = "block";
        document.querySelectorAll(".option-card").forEach((el, i) => {
          if (i === questions[currentQuestionIndex].correct) el.classList.add("correct");
          else if (i === userAnswers[currentQuestionIndex]) el.classList.add("incorrect");
        });
        document.getElementById("scoreboard").innerText = `ពិន្ទុ៖ ${score} / ${questions.length}`;
      }

      function prevQuestion() {
        if (currentQuestionIndex > 0) loadQuestion(currentQuestionIndex - 1);
      }
      function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) loadQuestion(currentQuestionIndex + 1);
      }

      window.onload = () => {
        initSidebar();
        loadQuestion(0);
      };
    </script>
  </body>
</html>
